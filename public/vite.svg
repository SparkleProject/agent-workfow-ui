  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Top node -->
  <circle cx="128" cy="52" r="22" fill="#fff" opacity="0.95"/>
  <circle cx="128" cy="52" r="10" fill="#6366f1"/>
  <!-- Bottom-left node -->
  <circle cx="64" cy="196" r="22" fill="#fff" opacity="0.95"/>
  <circle cx="64" cy="196" r="10" fill="#8b5cf6"/>
  <!-- Bottom-right node -->
  <circle cx="192" cy="196" r="22" fill="#fff" opacity="0.95"/>
  <circle cx="192" cy="196" r="10" fill="#8b5cf6"/>
  <!-- Center node (diamond/decision) -->
  <rect x="108" y="104" width="40" height="40" rx="4" transform="rotate(45 128 124)" fill="#fff" opacity="0.95"/>
  <circle cx="128" cy="124" r="8" fill="#7c3aed"/>
  <!-- Connectors -->
  <line x1="128" y1="74" x2="128" y2="100" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="112" y1="140" x2="80" y2="176" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="144" y1="140" x2="176" y2="176" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- Arrow heads -->
